<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Salary Calculator — Ezequiel Amador</title>
    <meta name="description" content="Binary search over the liquidation engine to find net salary from gross input. No business logic duplicated." />
    <meta name="author" content="Ezequiel Amador" />

    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
      @theme {
        --default-font-family: "Inter";
        --font-mono: "JetBrains Mono", ui-monospace, monospace;
        --color-cream-50: oklch(0.983 0.003 89);
        --color-cream-100: oklch(0.974 0.004 89);
        --color-cream-200: oklch(0.948 0.006 90);
        --color-cream-300: oklch(0.918 0.005 90);
        --color-cream-400: oklch(0.835 0.008 89);
        --color-cream-500: oklch(0.677 0.009 89);
        --color-cream-600: oklch(0.553 0.010 89);
        --color-cream-700: oklch(0.408 0.007 89);
        --color-cream-800: oklch(0.288 0.008 89);
        --color-cream-900: oklch(0.205 0.007 89);
        --color-cream-950: oklch(0.155 0.005 89);
        --color-brand-50: oklch(0.971 0.014 55);
        --color-brand-100: oklch(0.929 0.038 60);
        --color-brand-200: oklch(0.864 0.083 55);
        --color-brand-300: oklch(0.789 0.142 51);
        --color-brand-400: oklch(0.704 0.187 43);
        --color-brand-500: oklch(0.636 0.225 36);
        --color-brand-600: oklch(0.563 0.193 36);
        --color-brand-700: oklch(0.470 0.158 38);
        --color-brand-800: oklch(0.372 0.124 39);
        --color-brand-900: oklch(0.281 0.092 39);
        --color-brand-950: oklch(0.183 0.061 41);
        --color-peach: oklch(0.769 0.064 41);
        --color-mint: oklch(0.786 0.063 144);
        --color-azure: oklch(0.766 0.062 246);
        --color-lavender: oklch(0.738 0.072 297);
        --color-gold: oklch(0.633 0.111 65);
      }
    </style>

    <script defer src="/assets/js/translations.js"></script>
    <script defer src="/assets/js/i18n.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }
      #swup { transition: opacity 0.3s ease; }
      html.is-animating #swup { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      x-data="{
        darkMode: false,
        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          if (this.darkMode) {
            document.body.parentNode.classList.add('dark');
          } else {
            document.body.parentNode.classList.remove('dark');
          }
        },
        nc(p) {
          return Alpine.store('i18n').path === p
            ? 'text-sm font-semibold text-cream-900 underline underline-offset-4 decoration-brand-500 dark:text-white'
            : 'text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white';
        }
      }"
      class="min-h-dvh min-w-[320px] bg-cream-100 text-cream-900 dark:bg-cream-950 dark:text-cream-200"
    >
      <!-- Top Nav -->
      <header class="border-b border-cream-300 dark:border-white/10" hx-get="/partials/nav.html" hx-trigger="load" hx-swap="innerHTML" hx-on::after-swap="if(window.Alpine) Alpine.initTree(this)">
      </header>
      <!-- END Top Nav -->

      <main id="swup" class="mx-auto max-w-6xl px-5 lg:px-10">
        <div class="py-20">

          <!-- Back link -->
          <a href="/projects/" class="inline-flex items-center gap-1.5 text-sm font-medium text-cream-600 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4"><path d="m15 18-6-6 6-6"/></svg>
            <span x-text="$store.i18n.t('projects.detail_back')">← Projects</span>
          </a>

          <!-- Hero -->
          <div class="mt-8">
            <div class="flex items-center gap-3">
              <span class="font-mono text-sm text-cream-500 dark:text-cream-600">01</span>
              <span class="inline-flex items-center gap-1.5 rounded-full bg-mint/25 px-2.5 py-1 text-xs font-semibold uppercase tracking-tight text-cream-900 dark:text-cream-100">Ruby · Rails</span>
            </div>
            <h1 class="mt-4 text-3xl font-normal leading-tight tracking-tight md:text-4xl" x-text="$store.i18n.t('projects.p01_title')">Salary Calculator</h1>
          </div>

          <!-- Metadata row -->
          <div class="mt-6 flex flex-wrap gap-6 border-b border-cream-200 pb-8 dark:border-white/10">
            <div class="flex flex-col gap-0.5">
              <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-500 dark:text-cream-600" x-text="$store.i18n.t('projects.detail_role')">Role</span>
              <span class="text-sm font-medium text-cream-800 dark:text-cream-300" x-text="$store.i18n.t('projects.p01_role')">Software Developer</span>
            </div>
            <div class="flex flex-col gap-0.5">
              <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-500 dark:text-cream-600" x-text="$store.i18n.t('projects.detail_team')">Team</span>
              <span class="text-sm font-medium text-cream-800 dark:text-cream-300" x-text="$store.i18n.t('projects.p01_team')">[fill in]</span>
            </div>
            <div class="flex flex-col gap-0.5">
              <span class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-500 dark:text-cream-600" x-text="$store.i18n.t('projects.detail_duration')">Duration</span>
              <span class="text-sm font-medium text-cream-800 dark:text-cream-300" x-text="$store.i18n.t('projects.p01_duration')">[fill in]</span>
            </div>
          </div>

          <!-- Content grid -->
          <div class="mt-12 grid gap-12 lg:grid-cols-12">

            <!-- Left: prose -->
            <div class="space-y-10 lg:col-span-8">

              <!-- Short desc -->
              <p class="text-base/relaxed text-cream-700 dark:text-cream-400" x-text="$store.i18n.t('projects.p01_desc')"></p>

              <!-- Impact -->
              <div>
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-600 dark:text-cream-500" x-text="$store.i18n.t('projects.detail_impact')">Impact</h2>
                <ul class="mt-4 space-y-2" x-data="{ items: $store.i18n.t('projects.p01_impact').split('|') }">
                  <template x-for="item in items" :key="item">
                    <li class="flex gap-3 text-sm/relaxed text-cream-700 dark:text-cream-400">
                      <span class="mt-[0.45rem] size-1.5 shrink-0 rounded-full bg-brand-400"></span>
                      <span x-text="item"></span>
                    </li>
                  </template>
                </ul>
              </div>

              <!-- Approach -->
              <div>
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-600 dark:text-cream-500" x-text="$store.i18n.t('projects.detail_approach')">How I did it</h2>
                <p class="mt-4 text-sm/relaxed text-cream-700 dark:text-cream-400" x-html="$store.i18n.t('projects.p01_approach')"></p>
              </div>

              <!-- Challenges -->
              <div>
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-600 dark:text-cream-500" x-text="$store.i18n.t('projects.detail_challenges')">Technical challenges</h2>
                <p class="mt-4 text-sm/relaxed text-cream-700 dark:text-cream-400" x-html="$store.i18n.t('projects.p01_challenges')"></p>
              </div>

            </div>

            <!-- Right: sidebar -->
            <div class="space-y-8 lg:col-span-4">

              <!-- Full tech stack -->
              <div>
                <h2 class="text-[11px] font-semibold uppercase tracking-[0.08em] text-cream-600 dark:text-cream-500" x-text="$store.i18n.t('projects.detail_stack')">Full tech stack</h2>
                <div class="mt-4 flex flex-wrap gap-2" x-data="{ tags: $store.i18n.t('projects.p01_stack').split('|') }">
                  <template x-for="tag in tags" :key="tag">
                    <span class="inline-flex items-center rounded-full bg-cream-200 px-2.5 py-1 text-xs font-medium text-cream-800 dark:bg-white/10 dark:text-cream-300" x-text="tag"></span>
                  </template>
                </div>
              </div>

            </div>
          </div>

        </div>
      </main>

      <!-- Footer -->
      <footer class="border-t border-cream-300 dark:border-white/10" hx-get="/partials/footer.html" hx-trigger="load" hx-swap="innerHTML" hx-on::after-swap="if(window.Alpine) Alpine.initTree(this)">
      </footer>
      <!-- END Footer -->
    </div>
    <script src="/assets/js/htmx.min.js"></script>
    <script src="/assets/js/swup.min.js"></script>
    <script>
      const swup = new Swup({ animateHistoryBrowsing: true });
      swup.hooks.on('page:view', () => {
        const container = document.querySelector('#swup');
        if (container) Alpine.initTree(container);
        if (window.Alpine) Alpine.store('i18n').syncPath();
      });
    </script>
  </body>
</html>
