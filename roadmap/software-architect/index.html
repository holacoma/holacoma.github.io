<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Software Architect Roadmap — Ezequiel Amador</title>
    <meta name="description" content="Software Architect roadmap based on roadmap.sh. Work in progress." />
    <meta name="author" content="Ezequiel Amador" />

    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
      @theme {
        --default-font-family: "Inter";
        --font-mono: "JetBrains Mono", ui-monospace, monospace;
        --color-cream-50: oklch(0.983 0.003 89);
        --color-cream-100: oklch(0.974 0.004 89);
        --color-cream-200: oklch(0.948 0.006 90);
        --color-cream-300: oklch(0.918 0.005 90);
        --color-cream-400: oklch(0.835 0.008 89);
        --color-cream-500: oklch(0.677 0.009 89);
        --color-cream-600: oklch(0.553 0.010 89);
        --color-cream-700: oklch(0.408 0.007 89);
        --color-cream-800: oklch(0.288 0.008 89);
        --color-cream-900: oklch(0.205 0.007 89);
        --color-cream-950: oklch(0.155 0.005 89);
        --color-brand-50: oklch(0.971 0.014 55);
        --color-brand-100: oklch(0.929 0.038 60);
        --color-brand-200: oklch(0.864 0.083 55);
        --color-brand-300: oklch(0.789 0.142 51);
        --color-brand-400: oklch(0.704 0.187 43);
        --color-brand-500: oklch(0.636 0.225 36);
        --color-brand-600: oklch(0.563 0.193 36);
        --color-brand-700: oklch(0.470 0.158 38);
        --color-brand-800: oklch(0.372 0.124 39);
        --color-brand-900: oklch(0.281 0.092 39);
        --color-brand-950: oklch(0.183 0.061 41);
        --color-peach: oklch(0.769 0.064 41);
        --color-mint: oklch(0.786 0.063 144);
        --color-azure: oklch(0.766 0.062 246);
        --color-lavender: oklch(0.738 0.072 297);
        --color-gold: oklch(0.633 0.111 65);
      }
    </style>

    <script defer src="/assets/js/translations.js"></script>
    <script defer src="/assets/js/i18n.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>[x-cloak] { display: none !important; }
      #swup { transition: opacity 0.3s ease; }
      html.is-animating #swup { opacity: 0; }
    </style>
  </head>
  <body>
    <div
      x-data="{
        darkMode: false,
        toggleDarkMode() {
          this.darkMode = !this.darkMode;
          if (this.darkMode) {
            document.body.parentNode.classList.add('dark');
          } else {
            document.body.parentNode.classList.remove('dark');
          }
        },
        nc(p) {
          const path = Alpine.store('i18n').path;
          const active = p === '/roadmap/' ? path.startsWith('/roadmap/') : path === p;
          return active
            ? 'text-sm font-semibold text-cream-900 underline underline-offset-4 decoration-brand-500 dark:text-white'
            : 'text-sm font-medium text-cream-700 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white';
        }
      }"
      class="min-h-dvh min-w-[320px] bg-cream-100 text-cream-900 dark:bg-cream-950 dark:text-cream-200"
    >
      <!-- Top Nav -->
      <header class="border-b border-cream-300 dark:border-white/10" hx-get="/partials/nav.html" hx-trigger="load" hx-swap="innerHTML" hx-on::after-swap="if(window.Alpine) Alpine.initTree(this)">
      </header>
      <!-- END Top Nav -->

      <main id="swup" class="mx-auto max-w-6xl px-5 lg:px-10">
        <section class="py-20">
          <div class="grid gap-12 lg:grid-cols-12">
            <div class="lg:col-span-4">
              <a href="/roadmap/" class="inline-flex items-center gap-1.5 text-sm text-cream-600 hover:text-cream-900 dark:text-cream-500 dark:hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="size-4">
                  <path d="M19 12H5" /><path d="m12 19-7-7 7-7" />
                </svg>
                Roadmap
              </a>
              <div class="mt-4 flex flex-wrap items-center gap-2">
                <span class="inline-flex items-center rounded-md bg-cream-300 px-2 py-0.5 text-[11px] font-semibold text-cream-600 dark:bg-white/10 dark:text-cream-500">en progreso</span>
                <span class="font-mono text-xs text-cream-400 dark:text-cream-600">roadmap.sh/software-architect</span>
              </div>
              <h1 class="mt-3 text-3xl font-normal leading-tight tracking-tight md:text-4xl">Software Architect</h1>
              <p class="mt-5 text-sm/relaxed text-cream-700 dark:text-cream-500">
                En construcción. Este roadmap está siendo mapeado a partir de experiencia real en diseño de sistemas, decisiones de arquitectura y evaluación de trade-offs.
              </p>
            </div>

            <div class="lg:col-span-8">
              <div class="flex h-64 items-center justify-center rounded-xl border border-dashed border-cream-300 dark:border-white/10">
                <div class="text-center">
                  <p class="text-sm font-medium text-cream-500 dark:text-cream-600">Próximamente</p>
                  <p class="mt-1 text-xs text-cream-400 dark:text-cream-700">Basado en roadmap.sh/software-architect</p>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <!-- Footer -->
      <footer class="border-t border-cream-300 dark:border-white/10" hx-get="/partials/footer.html" hx-trigger="load" hx-swap="innerHTML" hx-on::after-swap="if(window.Alpine) Alpine.initTree(this)">
      </footer>
      <!-- END Footer -->
    </div>
    <script src="/assets/js/htmx.min.js"></script>
    <script src="/assets/js/swup.min.js"></script>
    <script>
      const swup = new Swup({ animateHistoryBrowsing: true });
      swup.hooks.on('page:view', () => {
        const container = document.querySelector('#swup');
        if (container) Alpine.initTree(container);
        if (window.Alpine) Alpine.store('i18n').syncPath();
      });
    </script>
  </body>
</html>
